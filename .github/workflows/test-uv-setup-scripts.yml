name: Test uv setup scripts

on:
  push:
  pull_request:

jobs:
  test-setup-scripts:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run POSIX setup script
        if: runner.os != 'Windows'
        run: ./scripts/setup_uv_env.sh

      - name: Run Windows setup script
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup_uv_env.ps1
