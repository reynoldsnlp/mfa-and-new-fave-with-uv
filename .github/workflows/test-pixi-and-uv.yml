name: Test pixi and uv directories

on:
  push:
  pull_request:

jobs:
  test-pixi-directory:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pixi setup from pixi/
        if: runner.os != 'Windows'
        run: ./pixi/setup_pixi_env.sh

      - name: Run pixi setup from pixi/ (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\pixi\setup_pixi_env.ps1

  test-uv-directory:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run uv setup from uv/
        if: runner.os != 'Windows'
        run: ./uv/setup_uv_env.sh

      - name: Run uv setup from uv/ (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\uv\setup_uv_env.ps1
